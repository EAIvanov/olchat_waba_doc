name: Notify docs portal

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs portal deploy
        env:
          GH_TOKEN: ${{ secrets.DOCS_PORTAL_DISPATCH_TOKEN }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/EAIvanov/olchat-docs-portal/dispatches \
            -d "{\"event_type\":\"gitbook-docs-updated\",\"client_payload\":{\"source_repo\":\"${SOURCE_REPOSITORY}\",\"sha\":\"${SOURCE_SHA}\"}}"
